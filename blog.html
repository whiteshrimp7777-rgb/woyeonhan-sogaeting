    var today = new Date();
    today.setHours(0,0,0,0);
    var currentFilter = 'all';

    function renderPosts() {
        var list = document.getElementById('blogList');
        var empty = document.getElementById('blogEmpty');
        list.innerHTML = '';
        var visiblePosts = posts.filter(function(p) {
            var pubDate = new Date(p.date);
            pubDate.setHours(0,0,0,0);
            if (pubDate > today) return false;
            if (currentFilter !== 'all' && p.category !== currentFilter) return false;
            return true;
        });
        visiblePosts.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
        if (visiblePosts.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        visiblePosts.forEach(function(p) {
            var d = new Date(p.date);
            var dateStr = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일';
            var card = document.createElement('a');
            card.className = 'blog-card';
            card.href = 'blog/' + p.id + '.html';
            card.innerHTML = '<div class="blog-card-meta"><span class="blog-card-category">' + p.category + '</span><span class="blog-card-date">' + dateStr + '</span></div><h2>' + p.title + '</h2><p>' + p.desc + '</p>';
            list.appendChild(card);
        });
    }

    document.querySelectorAll('.blog-filters button').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.blog-filters button').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderPosts();
        });
    });

    renderPosts();
